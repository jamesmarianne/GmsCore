name: Build GmsCore PR #290 Fix

on:
  workflow_dispatch:   # manual trigger — just click "Run workflow"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout zappybiby's fix branch
        uses: actions/checkout@v4
        with:
          repository: zappybiby/GmsCore
          ref: fix/gmscore-aa-compat-2026-02-pr
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install required SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Default release APK
        run: ./gradlew :play-services-core:assembleDefaultRelease --no-daemon --stacktrace --configuration-cache=off -PignoreGit=true
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GmsCore-PR290-fix
          path: play-services-core/build/outputs/apk/default/release/*.apk
          retention-days: 7
