name: Build GmsCore PR #290 Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_MICROG_VERSION_WITHOUT_GIT: '1'

    steps:
      - name: Checkout zappybiby's fix branch
        uses: actions/checkout@v4
        with:
          repository: zappybiby/GmsCore
          ref: fix/gmscore-aa-compat-2026-02-pr
          fetch-depth: 0

      - name: Create fake tag for git describe
        run: |
          git config user.email "ci@build.local"
          git config user.name "CI"
          git tag -a v0.3.13.2 -m "CI build tag" HEAD || git tag v0.3.13.2 HEAD || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install required SDK components
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Default release APK
        run: ./gradlew :play-services-core:assembleDefaultRelease --no-daemon --stacktrace --no-configuration-cache
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GmsCore-PR290-fix
          path: play-services-core/build/outputs/apk/default/release/*.apk
          retention-days: 7
